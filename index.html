<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微型 2D 賽車遊戲</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            user-select: none;
            touch-action: none;
        }
        canvas {
            background-color: #2c3e50; 
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- 載入賽車圖片 (已改為 png) ---
    const carImg = new Image();
    carImg.src = "car.png"; 

    // 玩家賽車初始資料
    const player = {
        x: canvas.width / 2 - 20,
        y: canvas.height - 100,
        width: 40,
        height: 75, 
        speed: 18 
    };

    // 障礙物設定
    const obstacles = [];
    const minObstacleWidth = 100;  
    const maxObstacleWidth = 220;  
    const obstacleHeight = 30;     

    // 速度線設定 (減少數量)
    const speedLines = [];
    for (let i = 0; i < 8; i++) { // 從 25 條減少到 8 條
        speedLines.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            length: 15 + Math.random() * 40,
            speedMultiplier: 1.5 + Math.random() * 1.0 
        });
    }
    const trails = [];

    // 遊戲狀態與數據
    let isGameOver = false;
    let gameScore = 0;
    
    let startTime = Date.now();
    let gameTime = 0;              
    let visualSpeed = 0;           
    let obstacleSpeed = 0;         
    
    let distanceTraveledSinceLastSpawn = 0;
    let nextSpawnDistance = 250;   

    // 控制狀態
    let isHolding = false;
    let clickX = 0;

    // 事件處理函數
    function handleStart(e) {
        if (isGameOver) {
            resetGame();
            return;
        }
        isHolding = true;
        updateClickPosition(e);
    }

    function handleMove(e) {
        if (isHolding) {
            updateClickPosition(e);
        }
    }

    function handleEnd() {
        isHolding = false;
    }

    function updateClickPosition(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        clickX = clientX - rect.left;
    }

    canvas.addEventListener("mousedown", handleStart);
    canvas.addEventListener("mousemove", handleMove);
    window.addEventListener("mouseup", handleEnd);

    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault(); 
        handleStart(e);
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        handleMove(e);
    }, { passive: false });

    window.addEventListener("touchend", handleEnd);

    // 重置遊戲
    function resetGame() {
        player.x = canvas.width / 2 - 20;
        player.y = canvas.height - 100;
        player.speed = 18; 

        obstacles.length = 0; 
        trails.length = 0; 
        
        for (let i = 0; i < speedLines.length; i++) {
            speedLines[i].y = Math.random() * canvas.height;
        }
        
        gameScore = 0;
        isGameOver = false;
        
        startTime = Date.now();
        gameTime = 0;
        visualSpeed = 0;
        obstacleSpeed = 0;
        distanceTraveledSinceLastSpawn = 0;
        nextSpawnDistance = 250; 

        gameLoop(); 
    }

    // 邏輯更新
    function update() {
        if (isGameOver) return;

        gameTime = (Date.now() - startTime) / 1000; 

        if (gameTime <= 5) {
            visualSpeed = (gameTime / 5) * 100;
        } else {
            visualSpeed = 100 + (gameTime - 5) * 5;
        }
        obstacleSpeed = visualSpeed / 20;

        // --- 玩家移動邏輯 ---
        if (isHolding) {
            const playerCenterX = player.x + player.width / 2;
            const distance = clickX - playerCenterX;

            if (Math.abs(distance) > player.speed) {
                if (distance < 0) {
                    player.x -= player.speed;
                } else {
                    player.x += player.speed;
                }
            } else {
                player.x = clickX - player.width / 2;
            }
            
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        }

        // --- 產生並更新殘影 ---
        if (obstacleSpeed > 1) {
            trails.push({
                x: player.x,
                y: player.y,
                width: player.width,
                height: player.height,
                alpha: 0.5 
            });
        }

        for (let i = trails.length - 1; i >= 0; i--) {
            trails[i].alpha -= 0.08; 
            trails[i].y += obstacleSpeed * 0.4; 

            if (trails[i].alpha <= 0) {
                trails.splice(i, 1);
            }
        }

        // --- 更新速度線 ---
        for (let i = 0; i < speedLines.length; i++) {
            let line = speedLines[i];
            line.y += obstacleSpeed * line.speedMultiplier * 1.5; 

            if (line.y > canvas.height) {
                line.y = -line.length;
                line.x = Math.random() * canvas.width;
            }
        }

        // --- 障礙物生成邏輯 ---
        distanceTraveledSinceLastSpawn += obstacleSpeed;
        
        if (distanceTraveledSinceLastSpawn >= nextSpawnDistance) {
            const randomWidth = minObstacleWidth + Math.floor(Math.random() * (maxObstacleWidth - minObstacleWidth));
            const randomX = Math.floor(Math.random() * (canvas.width - randomWidth));
            
            obstacles.push({
                x: randomX,
                y: -obstacleHeight,
                width: randomWidth,
                height: obstacleHeight
            });
            
            distanceTraveledSinceLastSpawn = 0;
            nextSpawnDistance = 200 + Math.random() * 150;
        }

        // --- 障礙物移動與碰撞 ---
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].y += obstacleSpeed;

            if (
                player.x < obstacles[i].x + obstacles[i].width &&
                player.x + player.width > obstacles[i].x &&
                player.y < obstacles[i].y + obstacles[i].height &&
                player.y + player.height > obstacles[i].y
            ) {
                isGameOver = true; 
            }

            if (obstacles[i].y > canvas.height) {
                obstacles.splice(i, 1);
                gameScore += 10; 
            }
        }
    }

    // 畫面繪製
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 畫出中央隱形分界虛線
        ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
        ctx.setLineDash([20, 20]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]); 

        // 畫出速度線 (調低透明度至 0.25)
        ctx.fillStyle = "rgba(255, 255, 255, 0.25)";
        for (let i = 0; i < speedLines.length; i++) {
            let line = speedLines[i];
            ctx.fillRect(line.x, line.y, 2, line.length);
        }

        // 畫出車身影像殘影
        for (let i = 0; i < trails.length; i++) {
            let trail = trails[i];
            ctx.globalAlpha = trail.alpha; 
            ctx.drawImage(carImg, trail.x, trail.y, trail.width, trail.height);
        }
        ctx.globalAlpha = 1.0; 

        // 畫出玩家賽車本體貼圖
        ctx.drawImage(carImg, player.x, player.y, player.width, player.height);

        // 畫出障礙物
        ctx.fillStyle = "#e74c3c";
        for (let i = 0; i < obstacles.length; i++) {
            const obs = obstacles[i];
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            
            // 高光立體感
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            ctx.fillRect(obs.x, obs.y, obs.width, 5); 
            ctx.fillStyle = "#e74c3c"; 
        }

        // UI 顯示
        ctx.fillStyle = "white";
        ctx.font = "bold 16px Arial";
        ctx.fillText(`時間: ${gameTime.toFixed(1)} s`, 15, 30);
        ctx.fillText(`分數: ${gameScore}`, 15, 55);
        ctx.fillText(`時速: ${visualSpeed.toFixed(0)} km/h`, 15, 80);

        // Game Over
        if (isGameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#e74c3c";
            ctx.font = "bold 44px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);

            ctx.fillStyle = "white";
            ctx.font = "bold 20px Arial";
            ctx.fillText(`存活時間: ${gameTime.toFixed(1)} 秒`, canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText(`最終得分: ${gameScore}`, canvas.width / 2, canvas.height / 2 + 40);
            ctx.fillText("點擊任意處重新開始", canvas.width / 2, canvas.height / 2 + 90);
            
            ctx.textAlign = "left"; 
        }
    }

    // 主循環
    function gameLoop() {
        update();
        draw();
        
        if (!isGameOver) {
            requestAnimationFrame(gameLoop);
        }
    }

    // 等待圖片載入完成後再啟動遊戲
    carImg.onload = () => {
        gameLoop();
    };
    
    // 防呆機制
    carImg.onerror = () => {
        console.error("找不到 car.png，請確認圖片是否與 index.html 放在同一個資料夾，且檔名正確！");
        gameLoop();
    };
</script>
</body>
</html>
